name: CI

on:
  push:
    branches: [staging, main]
  pull_request:
    branches: [staging, main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Turborepo remote caching (optional — set in repo secrets)
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

jobs:
  # ─────────────────────────────────────────────────────────────
  # 1. Type check + lint
  # ─────────────────────────────────────────────────────────────
  lint-typecheck:
    name: TypeScript & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeScript check
        run: pnpm tsc --noEmit

      - name: Lint
        run: pnpm lint

  # ─────────────────────────────────────────────────────────────
  # 2. Unit + integration tests (with Supabase)
  # ─────────────────────────────────────────────────────────────
  unit-tests:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Start Supabase local stack
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start Supabase
        run: supabase start

      - name: Set up branch schema
        run: |
          # Determine schema name from branch
          BRANCH="${GITHUB_HEAD_REF:-${GITHUB_REF#refs/heads/}}"
          if [[ ! "$BRANCH" =~ ^[a-zA-Z0-9/_.-]+$ ]]; then
            echo "::error::Invalid branch name: $BRANCH"
            exit 1
          fi
          chmod +x ./scripts/db-setup.sh
          ./scripts/db-setup.sh create "$BRANCH"

          # Export env for subsequent steps
          SCHEMA=$(./scripts/db-setup.sh status "$BRANCH" 2>/dev/null | grep "Schema:" | awk '{print $2}')
          echo "DB_SCHEMA=$SCHEMA" >> $GITHUB_ENV
          echo "DATABASE_URL=postgresql://postgres:postgres@localhost:54322/postgres?options=-csearch_path%3D$SCHEMA" >> $GITHUB_ENV

          # Get Supabase credentials
          SUPABASE_URL=$(supabase status --output json | jq -r '.API_URL')
          ANON_KEY=$(supabase status --output json | jq -r '.ANON_KEY')
          echo "NEXT_PUBLIC_SUPABASE_URL=$SUPABASE_URL" >> $GITHUB_ENV
          echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=$ANON_KEY" >> $GITHUB_ENV

      - name: Run unit tests
        run: pnpm test:run
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
          DB_SCHEMA: ${{ env.DB_SCHEMA }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ env.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ env.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            coverage/
            test-results/

  # ─────────────────────────────────────────────────────────────
  # 3. Playwright E2E tests
  # ─────────────────────────────────────────────────────────────
  playwright:
    name: Playwright E2E
    runs-on: ubuntu-latest
    needs: unit-tests
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Start Supabase
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - run: supabase start

      - name: Set up branch schema
        run: |
          BRANCH="${GITHUB_HEAD_REF:-${GITHUB_REF#refs/heads/}}"
          if [[ ! "$BRANCH" =~ ^[a-zA-Z0-9/_.-]+$ ]]; then
            echo "::error::Invalid branch name: $BRANCH"
            exit 1
          fi
          chmod +x ./scripts/db-setup.sh
          ./scripts/db-setup.sh create "$BRANCH"
          SCHEMA=$(./scripts/db-setup.sh status "$BRANCH" 2>/dev/null | grep "Schema:" | awk '{print $2}')
          echo "DB_SCHEMA=$SCHEMA" >> $GITHUB_ENV
          echo "DATABASE_URL=postgresql://postgres:postgres@localhost:54322/postgres?options=-csearch_path%3D$SCHEMA" >> $GITHUB_ENV
          SUPABASE_URL=$(supabase status --output json | jq -r '.API_URL')
          ANON_KEY=$(supabase status --output json | jq -r '.ANON_KEY')
          echo "NEXT_PUBLIC_SUPABASE_URL=$SUPABASE_URL" >> $GITHUB_ENV
          echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=$ANON_KEY" >> $GITHUB_ENV

      - name: Build app
        run: pnpm build --filter=web
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ env.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ env.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

      - name: Run Playwright tests
        run: pnpm test:e2e
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
          DB_SCHEMA: ${{ env.DB_SCHEMA }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ env.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ env.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          PLAYWRIGHT_BASE_URL: http://localhost:3000

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Upload screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-screenshots
          path: .claude/task/screenshots/
          retention-days: 7
